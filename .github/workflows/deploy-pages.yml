name: Publish frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - '404.html'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-static
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Commit branch-source Pages assets
        if: github.actor != 'github-actions[bot]'
        working-directory: .
        run: |
          rm -rf assets index.html 404.html .nojekyll
          cp -R frontend/build/* .
          cp index.html 404.html
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets index.html 404.html .nojekyll
          if git diff --cached --quiet; then
            echo "No branch-source Pages asset changes."
          else
            git commit -m "chore(pages): publish frontend static assets"
            git push origin HEAD:main
          fi
