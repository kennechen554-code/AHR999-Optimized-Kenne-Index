name: Codex Apply CI Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codex-apply-ci-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified frontend CI patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/codex-fix.patch.b64 <<'PATCH_B64'

PATCH_B64
          base64 -d /tmp/codex-fix.patch.b64 > /tmp/codex-fix.patch
          git apply --index /tmp/codex-fix.patch
          git rm .github/workflows/codex-apply-ci-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(frontend): 修复依赖审计并清理冗余页面"
          git push
